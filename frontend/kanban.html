<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>칸반 · TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <span class="text-teal-600 font-bold">TaskFlow</span>
          <span id="teamName" class="text-slate-500 text-sm"></span>
        </div>
        <nav class="flex gap-1 text-sm">
          <a href="kanban.html" class="px-3 py-1.5 rounded-lg bg-teal-600 text-white">칸반</a>
          <a href="chat.html" class="px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-100">채팅</a>
          <a href="members.html" class="px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-100">멤버</a>
        </nav>
        <div class="text-sm text-slate-500">
          <span id="email"></span>
          <button onclick="logout()" class="ml-3 text-slate-600 hover:text-slate-900">로그아웃</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
      <div class="flex items-center gap-2 mb-4">
        <button data-filter="" class="filter px-3 py-1.5 text-sm rounded-lg bg-slate-800 text-white">전체</button>
        <button data-filter="me" class="filter px-3 py-1.5 text-sm rounded-lg bg-white border border-slate-300 text-slate-600">@me</button>
        <button data-filter="unassigned" class="filter px-3 py-1.5 text-sm rounded-lg bg-white border border-slate-300 text-slate-600">미할당</button>
      </div>

      <div class="grid md:grid-cols-3 gap-4">
        <div data-col="TODO"></div>
        <div data-col="DOING"></div>
        <div data-col="DONE"></div>
      </div>
    </main>

    <!-- 카드 상세/수정 모달 -->
    <div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-20">
      <div class="bg-white rounded-2xl w-full max-w-lg p-6">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-bold text-slate-800"><span id="mId" class="text-slate-400"></span> 카드 수정</h3>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-xl">✕</button>
        </div>
        <input id="mTitle" maxlength="100"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-teal-500" />
        <div class="mb-3">
          <span class="text-sm text-slate-500 mr-2">상태</span>
          <span id="mStatus" class="inline-flex gap-1"></span>
        </div>
        <div class="mb-3">
          <label class="text-sm text-slate-500 mr-2">담당자</label>
          <select id="mAssignee" class="border border-slate-300 rounded-lg px-2 py-1.5 text-sm"></select>
        </div>
        <p id="mMeta" class="text-xs text-slate-400 mb-4"></p>
        <div id="mErr" class="hidden text-sm text-red-600 mb-2"></div>
        <div class="flex gap-2">
          <button onclick="saveTask()" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-lg py-2">저장</button>
          <button id="mDelete" onclick="deleteTask()" class="hidden border border-red-300 text-red-600 rounded-lg px-4 py-2">🗑 삭제</button>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/kanban.js"></script>
  </body>
</html>
