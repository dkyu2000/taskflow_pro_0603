<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>채팅 · TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <span class="text-teal-600 font-bold">TaskFlow</span>
          <span id="teamName" class="text-slate-500 text-sm"></span>
        </div>
        <nav class="flex gap-1 text-sm">
          <a href="kanban.html" class="px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-100">칸반</a>
          <a href="chat.html" class="px-3 py-1.5 rounded-lg bg-teal-600 text-white">채팅</a>
          <a href="members.html" class="px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-100">멤버</a>
        </nav>
        <div class="text-sm text-slate-500">
          <span id="email"></span>
          <button onclick="logout()" class="ml-3 text-slate-600 hover:text-slate-900">로그아웃</button>
        </div>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">
      <div class="bg-white rounded-2xl border border-slate-200 flex flex-col" style="height: 70vh">
        <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
          <span class="font-semibold text-slate-700">채팅</span>
          <span id="status" class="text-xs text-emerald-600">● 5초마다 새로고침</span>
        </div>

        <div id="list" class="flex-1 overflow-y-auto px-4 py-3 space-y-3"></div>

        <div class="border-t border-slate-100 p-3">
          <div class="flex gap-2">
            <input id="input" maxlength="2000" placeholder="메시지 입력 (1000자 이내)…"
              class="flex-1 border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500" />
            <button id="send" class="bg-teal-600 hover:bg-teal-700 text-white font-semibold px-5 rounded-lg disabled:opacity-50">전송</button>
          </div>
          <div class="flex justify-between mt-1">
            <span id="err" class="text-xs text-red-600"></span>
            <span id="counter" class="text-xs text-slate-400">0 / 1000</span>
          </div>
        </div>
      </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
  </body>
</html>
